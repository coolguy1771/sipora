name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-Dwarnings"
  RELEASE_BINARIES: >-
    sipora-proxy sipora-b2bua sipora-edge sipora-lb sipora-api sipora-migrate

jobs:
  verify:
    name: Verify release build
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - name: Install librdkafka build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake pkg-config \
            libcurl4-openssl-dev libsasl2-dev zlib1g-dev libssl-dev
      - run: cargo fmt --all -- --check
      - run: cargo clippy --workspace --all-targets -- -D warnings
      - run: cargo test --workspace
      - run: cargo build --release --workspace

  package:
    name: Package binaries and publish release assets
    needs: [verify]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      hashes: ${{ steps.hash.outputs.hashes }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - name: Install librdkafka build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake pkg-config \
            libcurl4-openssl-dev libsasl2-dev zlib1g-dev libssl-dev
      - name: Build release binaries
        run: cargo build --release --workspace
      - name: Create distribution archives
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          mkdir -p dist
          for bin in ${RELEASE_BINARIES}; do
            out="dist/${bin}-${VERSION}-x86_64-unknown-linux-gnu.tar.gz"
            tar -czf "$out" -C target/release "$bin"
          done
          (cd dist && sha256sum ./*.tar.gz) > dist/SHA256SUMS
      - name: Record subjects for SLSA provenance
        id: hash
        run: |
          set -euo pipefail
          b64=$(cd dist && sha256sum ./*.tar.gz SHA256SUMS | base64 -w0)
          echo "hashes=${b64}" >> "$GITHUB_OUTPUT"
      - name: Publish GitHub Release assets
        uses: softprops/action-gh-release@c95fe1489396fe8a9eb87c0abf8aa5b2ef267fda # v2.2.1
        with:
          generate_release_notes: true
          files: |
            dist/*.tar.gz
            dist/SHA256SUMS

  provenance:
    name: SLSA provenance
    needs: [package]
    permissions:
      actions: read
      id-token: write
      contents: write
    uses: slsa-framework/slsa-github-generator/.github/workflows/generator_generic_slsa3.yml@v2.1.0
    with:
      base64-subjects: "${{ needs.package.outputs.hashes }}"
      upload-assets: true
      upload-tag-name: "${{ github.ref_name }}"

  publish-images:
    name: Push container ${{ matrix.binary }}
    needs: [verify]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        binary:
          - sipora-proxy
          - sipora-b2bua
          - sipora-edge
          - sipora-lb
          - sipora-api
          - sipora-migrate
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Image name (GHCR is case-insensitive; normalize)
        id: image
        env:
          REPO: ${{ github.repository }}
          BIN: ${{ matrix.binary }}
        run: |
          set -euo pipefail
          r=$(echo "$REPO" | tr '[:upper:]' '[:lower:]')
          echo "ref=ghcr.io/${r}/${BIN}" >> "$GITHUB_OUTPUT"
      - uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4
      - uses: docker/login-action@9780b0c442fbb1117ed29e0efdff1e18412f7567 # v3.3.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/metadata-action@369eb591f429131d6889c46b94e711f089e6ca96 # v5.6.1
        id: meta
        with:
          images: ${{ steps.image.outputs.ref }}
          tags: |
            type=raw,value=${{ github.ref_name }}
            type=raw,value=latest
      - uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7
        id: push
        with:
          context: .
          file: deploy/docker/Dockerfile.${{ matrix.binary }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: mode=max
          sbom: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - uses: sigstore/cosign-installer@c56c2d3e59e4281cc41dea2217323ba5694b171e # v3.8.0
      - name: Cosign (keyless)
        env:
          DIGEST: ${{ steps.push.outputs.digest }}
          IMAGE_REF: ${{ steps.image.outputs.ref }}
        run: cosign sign --yes "${IMAGE_REF}@${DIGEST}"
