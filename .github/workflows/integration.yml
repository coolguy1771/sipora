name: Integration

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-Dwarnings"

jobs:
  postgres-valkey:
    name: Migrations and tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:18@sha256:78481659c47e862334611ccdaf7c369c986b3046da9857112f3b309114a65fb4
        env:
          POSTGRES_USER: sipora
          POSTGRES_PASSWORD: test_only_not_production
          POSTGRES_DB: sipora_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 2s
          --health-timeout 5s
          --health-retries 10
      valkey:
        image: valkey/valkey:9-alpine@sha256:e1095c6c76ee982cb2d1e07edbb7fb2a53606630a1d810d5a47c9f646b708bf5
        ports:
          - 6379:6379
        options: >-
          --health-cmd "valkey-cli ping"
          --health-interval 2s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - name: Install librdkafka build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake pkg-config libcurl4-openssl-dev libsasl2-dev zlib1g-dev libssl-dev
      - name: Apply SQL migrations
        env:
          DATABASE_URL: postgres://sipora:test_only_not_production@localhost:5432/sipora_test
        run: cargo run -p sipora-migrate -- --database-url "$DATABASE_URL"
      - name: Cargo test
        env:
          DATABASE_URL: postgres://sipora:test_only_not_production@localhost:5432/sipora_test
        run: cargo test --workspace
