name: Integration

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-Dwarnings"

jobs:
  postgres-redis:
    name: Migrations and tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17@sha256:5b96f1a16bd9768b060dd2ffe55cb6225c4d9ef4d214a8b21eb08134869a97e4
        env:
          POSTGRES_USER: sipora
          POSTGRES_PASSWORD: test_only_not_production
          POSTGRES_DB: sipora_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 2s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine@sha256:7aec734b2bb298a1d769fd8729f13b8514a41bf90fcdd1f38ec52267fbaa8ee6
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 2s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - name: Install librdkafka build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake pkg-config libcurl4-openssl-dev libsasl2-dev zlib1g-dev libssl-dev
      - name: Apply SQL migrations
        env:
          DATABASE_URL: postgres://sipora:test_only_not_production@localhost:5432/sipora_test
        run: cargo run -p sipora-migrate -- --database-url "$DATABASE_URL"
      - name: Cargo test
        run: cargo test --workspace
