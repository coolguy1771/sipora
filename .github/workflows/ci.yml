name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-Dwarnings"

jobs:
  check:
    name: Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install librdkafka build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake pkg-config libcurl4-openssl-dev libsasl2-dev zlib1g-dev libssl-dev
      - run: cargo check --workspace --all-targets

  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - name: Install librdkafka build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake pkg-config libcurl4-openssl-dev libsasl2-dev zlib1g-dev libssl-dev
      - run: cargo clippy --workspace --all-targets -- -D warnings

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install librdkafka build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake pkg-config libcurl4-openssl-dev libsasl2-dev zlib1g-dev libssl-dev
      - run: cargo test --workspace

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [check, test]
    strategy:
      matrix:
        binary: [sipora-proxy, sipora-b2bua, sipora-edge, sipora-lb, sipora-api, sipora-migrate]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/docker/Dockerfile.${{ matrix.binary }}
          push: false
          tags: sipora/${{ matrix.binary }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
