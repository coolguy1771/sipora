# Example for sipora-api (REST provisioning API).
# Copy to sipora.toml in the working directory, or set SIPORA_CONFIG=sipora
# and merge with SIPORA__* overrides.
#
# Local dev without Postgres: run with --mock-store or SIPORA_API_MOCK_STORE=1
# (in-memory only; not for production).
#
# HTTP listen port is set by CLI: --port / SIPORA_API_PORT (default 8080).
# For /api/* authentication, set api_bearer_token here or via
# SIPORA__AUTH__API_BEARER_TOKEN (recommended in production).

[general]
domain = "sip.example.com"
sips_port = 5061
wss_port = 443
outbound_port = 5065
health_port = 8080

[tls]
min_version = "1.3"
mtls_trunks = false
ocsp_staple = true
cert_renew_threshold = 0.8
acme_provider = "letsencrypt"

[rate_limit]
register_rate = 20
invite_rate = 10
dialog_rate = 100
block_threshold = 5
block_window_s = 60
block_cooldown_s = 300

[registrar]
min_expires = 60
max_expires = 3600
default_expires = 600
nonce_ttl_s = 60

[proxy]
max_forwards = 70
fork_parallel = true
trace_header = "X-Trace-ID"
location_timeout_ms = 50

[auth]
nonce_ttl_s = 60
nonce_len = 32
jwks_url = "https://idp.example.com/oauth2/jwks"
auth_timeout_ms = 50
jwt_expected_issuer = "https://idp.example.com"
jwt_expected_audience = "sipora-api"

[redis]
nodes = ["redis://127.0.0.1:6379"]
cluster_mode = false
max_call_s = 14400

[postgres]
url = "postgres://127.0.0.1:5432/sipora"
max_pool_size = 200
cdr_retention_months = 24

[telemetry]
otlp_endpoint = "http://127.0.0.1:4317"
service_name = "sipora-api"
metrics_interval_s = 15
success_sample_rate = 0.05

[media]
rtpengine_host = "rtp-proxy.internal"
allowed_codecs = ["opus", "G722", "G711u", "G711a"]
srtp_required = true
rtp_timeout_s = 30
