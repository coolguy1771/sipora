apiVersion: 1

contactPoints:
  - orgId: 1
    name: sip-platform-alerts
    receivers:
      - uid: pagerduty-critical
        type: pagerduty
        settings:
          integrationKey: ${PAGERDUTY_KEY}
          severity: critical
        disableResolveMessage: false

      - uid: slack-warnings
        type: slack
        settings:
          url: ${SLACK_WEBHOOK_URL}
          recipient: "#sip-alerts"
          title: "SIP Platform Alert"
        disableResolveMessage: false

policies:
  - orgId: 1
    receiver: sip-platform-alerts
    group_by:
      - alertname
      - severity
    group_wait: 30s
    group_interval: 5m
    repeat_interval: 4h
    routes:
      - receiver: pagerduty-critical
        matchers:
          - severity = critical
      - receiver: slack-warnings
        matchers:
          - severity = warning
