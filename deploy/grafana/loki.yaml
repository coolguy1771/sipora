auth_enabled: false

server:
  http_listen_port: 3100
  grpc_listen_port: 9097

common:
  path_prefix: /data/loki
  storage:
    s3:
      endpoint: ${LOKI_S3_ENDPOINT:minio:9000}
      bucketnames: loki-chunks
      access_key_id: ${LOKI_S3_ACCESS_KEY:minioadmin}
      secret_access_key: ${LOKI_S3_SECRET_KEY:minioadmin}
      insecure: true
  replication_factor: 1
  ring:
    kvstore:
      store: inmemory

schema_config:
  configs:
    - from: "2024-01-01"
      store: tsdb
      object_store: s3
      schema: v13
      index:
        prefix: index_
        period: 24h

limits_config:
  retention_period: 720h  # 30 days for INFO
  reject_old_samples: true
  reject_old_samples_max_age: 168h

compactor:
  working_directory: /data/loki/compactor
  retention_enabled: true
