server:
  http_listen_port: 3200
  grpc_listen_port: 9096

distributor:
  receivers:
    otlp:
      protocols:
        grpc:
          endpoint: 0.0.0.0:4317
        http:
          endpoint: 0.0.0.0:4318

storage:
  trace:
    backend: s3
    s3:
      endpoint: ${TEMPO_S3_ENDPOINT:minio:9000}
      bucket: tempo-traces
      access_key: ${TEMPO_S3_ACCESS_KEY:minioadmin}
      secret_key: ${TEMPO_S3_SECRET_KEY:minioadmin}
      insecure: true
    local:
      path: /data/tempo/traces
    wal:
      path: /data/tempo/wal
    block:
      bloom_filter_false_positive: 0.05

compactor:
  compaction:
    block_retention: 168h  # 7 days hot

overrides:
  defaults:
    metrics_generator:
      processors:
        - service-graphs
        - span-metrics
